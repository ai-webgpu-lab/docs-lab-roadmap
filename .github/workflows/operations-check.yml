name: Operations Status Check

on:
  workflow_dispatch:
    inputs:
      run_fast_suite:
        description: "Run the local fast test suite after live status checks"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      apply_project_fields:
        description: "Apply Project field sync instead of dry-run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "37 19 * * 0"

permissions:
  contents: read

concurrency:
  group: operations-status-check
  cancel-in-progress: false

jobs:
  operations:
    name: Live org operations gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.AI_WEBGPU_LAB_ADMIN_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_fast_suite == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Check GitHub API access
        run: |
          gh auth status
          gh repo view ai-webgpu-lab/docs-lab-roadmap --json nameWithOwner >/dev/null
          gh repo view ai-webgpu-lab/bench-runtime-shootout --json nameWithOwner >/dev/null
          gh project view 1 --owner ai-webgpu-lab --format json >/dev/null

      - name: Run live dashboard gates
        run: |
          node scripts/check-org-pages.mjs --fail-on-error
          node scripts/check-org-readmes.mjs --fail-on-error
          node scripts/check-org-workflows.mjs --fail-on-error

      - name: Sync Project fields
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.apply_project_fields }}" == "true" ]]; then
            node scripts/sync-project-fields.mjs
          else
            node scripts/sync-project-fields.mjs --dry-run
          fi

      - name: Check Project strict gate
        run: node scripts/check-project-status.mjs --fail-on-error --require-seeded-issues --require-project-items --require-project-fields

      - name: Render goal status gate
        run: node scripts/render-goal-status.mjs --fail-on-error

      - name: Run fast test suite
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_fast_suite == 'true' }}
        run: bash tests/run-all.sh --mode fast --quiet

      - name: Upload generated status dashboards
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: operations-status-dashboards
          path: |
            docs/PAGES-STATUS.md
            docs/README-STATUS.md
            docs/WORKFLOW-STATUS.md
            docs/PROJECT-STATUS.md
            docs/GOAL-STATUS.md
          if-no-files-found: error
