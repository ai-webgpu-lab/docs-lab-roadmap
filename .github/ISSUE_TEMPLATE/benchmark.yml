name: Benchmark
description: 벤치마크 시나리오 추가/수정
title: "[bench] "
labels: ["benchmark"]
body:
  - type: input
    id: scenario
    attributes:
      label: 시나리오 이름
      placeholder: llm-prefill-decode-v1
    validations:
      required: true

  - type: textarea
    id: workload
    attributes:
      label: 워크로드 정의
      placeholder: 입력 길이, 모델, 해상도, 데이터셋 등
    validations:
      required: true

  - type: textarea
    id: metrics
    attributes:
      label: 핵심 지표
      placeholder: ttft_ms, decode_tok_per_sec 등
    validations:
      required: true

  - type: textarea
    id: compare
    attributes:
      label: 비교 대상
      placeholder: WebLLM vs Transformers.js vs ORT-Web
