<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Deterministic studio scene fixture</title>
  <desc id="desc">A studio tabletop scene with a poster, notebook, teal mug, lamp, and compact camera.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#121826"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#25172c"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#433126"/>
      <stop offset="100%" stop-color="#241914"/>
